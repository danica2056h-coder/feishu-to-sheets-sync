name: 飞书数据同步引擎

on:
  repository_dispatch:
    types: [remote_sync]
  schedule:
    - cron: '*/15 * * * *' # 每 15 分钟执行一次

concurrency:
  group: sync-group
  cancel-in-progress: false # 如果上一个 150 表没跑完，新的任务排队等待

jobs:
  sync_job:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装依赖库
        run: pip install requests gspread oauth2client
      - name: 执行同步脚本
        env:
          # 从 GitHub Secrets 中读取敏感信息
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          G_SERVICE_ACCOUNT: ${{ secrets.G_SERVICE_ACCOUNT }}
        run: python main.py
