name: 飞书数据同步引擎

on:
  repository_dispatch:
    types: [remote_sync]
  workflow_dispatch:      # 👈 必须有这一行，GitHub 界面才会显示 Run workflow 按钮
  schedule:
    - cron: '*/15 * * * *' # 每 15 分钟运行一次

concurrency:
  group: sync-group
  cancel-in-progress: false # 确保 150 个表按顺序搬完，不会发生任务重叠

jobs:
  sync_job:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests gspread oauth2client
      - name: 执行搬运
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          G_SERVICE_ACCOUNT: ${{ secrets.G_SERVICE_ACCOUNT }}
        run: python main.py
