name: Feishu Real-time Sync

on:
  # 接收 Laf 发送的实时变动信号
  repository_dispatch:
    types: [remote_sync]
  # 保留手动触发按钮，以防万一需要手动全量跑
  workflow_dispatch: 

jobs:
  sync_changed_table:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread pandas

      - name: Run sync script
        env:
          # 把 Laf 传来的飞书 table_id 存入环境变量，供 Python 读取
          TARGET_TABLE_ID: ${{ github.event.client_payload.table_id }}
          
          # 读取你的保险箱密钥
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          MASTER_SHEET_ID: ${{ secrets.MASTER_SHEET_ID }}
        run: python main.py
